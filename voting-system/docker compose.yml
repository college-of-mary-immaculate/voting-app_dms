version: '3.8'

services:

  mysql-master:
    image: mysql:8.0
    container_name: mysql-master
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: appdb
    ports:
      - "3307:3306"
    command: --server-id=1 --log-bin=mysql-bin
    volumes:
      - master-data:/var/lib/mysql
    networks:
      - app-network

  mysql-slave1:
    image: mysql:8.0
    container_name: mysql-slave1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3308:3306"
    command: --server-id=2
    depends_on:
      - mysql-master
    volumes:
      - slave1-data:/var/lib/mysql
    networks:
      - app-network

  mysql-slave2:
    image: mysql:8.0
    container_name: mysql-slave2
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3309:3306"
    command: --server-id=3
    depends_on:
      - mysql-master
    volumes:
      - slave2-data:/var/lib/mysql
    networks:
      - app-network

  api:
    image: node:18
    container_name: api-server
    working_dir: /app
    volumes:
      - ./api:/app
    command: npm start
    ports:
      - "5000:5000"
    depends_on:
      - mysql-master
    networks:
      - app-network

  frontend1:
    image: nginx:latest
    container_name: frontend1
    volumes:
      - ./frontend:/usr/share/nginx/html
    networks:
      - app-network

  frontend2:
    image: nginx:latest
    container_name: frontend2
    volumes:
      - ./frontend:/usr/share/nginx/html
    networks:
      - app-network

  frontend3:
    image: nginx:latest
    container_name: frontend3
    volumes:
      - ./frontend:/usr/share/nginx/html
    networks:
      - app-network

  loadbalancer:
    image: nginx:latest
    container_name: loadbalancer
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend1
      - frontend2
      - frontend3
    networks:
      - app-network

networks:
  app-network:

volumes:
  master-data:
  slave1-data:
  slave2-data: