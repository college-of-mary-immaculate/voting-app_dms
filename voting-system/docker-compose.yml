version: '3.8'

services:

  mysql-master:
    image: mysql:8.0
    container_name: mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: voting
      MYSQL_REPLICATION_MODE: master
      MYSQL_REPLICATION_USER: repl_user
      MYSQL_REPLICATION_PASSWORD: repl_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-master-data:/var/lib/mysql
      - ./mysql/master/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./mysql/master/init:/docker-entrypoint-initdb.d
    networks:
      - voting-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-slave1:
    image: mysql:8.0
    container_name: mysql-slave1
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: voting
    ports:
      - "3307:3306"
    volumes:
      - mysql-slave1-data:/var/lib/mysql
      - ./mysql/slave1/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - voting-network
    depends_on:
      mysql-master:
        condition: service_healthy

  mysql-slave2:
    image: mysql:8.0
    container_name: mysql-slave2
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: voting
    ports:
      - "3308:3306"
    volumes:
      - mysql-slave2-data:/var/lib/mysql
      - ./mysql/slave2/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - voting-network
    depends_on:
      mysql-master:
        condition: service_healthy

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api
    environment:
      DB_HOST: mysql-master
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: voting
      JWT_SECRET: your_secret_key
      API_KEY: your_api_key
    ports:
      - "5000:5000"
    networks:
      - voting-network
    depends_on:
      mysql-master:
        condition: service_healthy

  frontend1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frontend1
    networks:
      - voting-network

  frontend2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frontend2
    networks:
      - voting-network

  frontend3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frontend3
    networks:
      - voting-network

  nginx:
    image: nginx:alpine
    container_name: nginx-lb
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - voting-network
    depends_on:
      - frontend1
      - frontend2
      - frontend3
      - api

networks:
  voting-network:
    driver: bridge

volumes:
  mysql-master-data:
  mysql-slave1-data:
  mysql-slave2-data:
